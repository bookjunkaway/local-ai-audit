<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Received | Local AI Audit</title>
  <style>
    :root {--bg:#0b1020;--card:#121933;--soft:#1a2345;--text:#eef2ff;--muted:#b8c2e6;--line:rgba(255,255,255,0.08)}
    *{box-sizing:border-box}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(180deg,#0b1020 0%,#11172c 100%);color:var(--text)}
    .wrap{max-width:820px;margin:0 auto;padding:24px}.card{margin-top:56px;background:linear-gradient(180deg,rgba(255,255,255,0.04),rgba(255,255,255,0.02));border:1px solid var(--line);border-radius:24px;padding:28px}.muted{color:var(--muted)}.cta{display:inline-block;margin-top:20px;padding:14px 22px;border-radius:14px;text-decoration:none;font-weight:700;background:rgba(255,255,255,0.08);border:1px solid var(--line);color:var(--text)}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Order received</h1>
      <p class="muted">Your payment is complete. The next step is to submit your business details so the order can be prepared correctly.</p>
      <p>Use the intake page to send your website, city, service, platform, and anything else that should be reviewed first.</p>
      <a class="cta" href="/intake.html">Go to the intake form</a>
    </div>
  </div>
</body>
</html>
