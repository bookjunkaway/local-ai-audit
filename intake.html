<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Intake | Local AI Audit</title>
  <meta name="description" content="Submit your business details after buying an AI Visibility Audit or fix kit so your repair plan can be prepared." />
  <style>body{font-family:ui-sans-serif,system-ui,sans-serif;max-width:860px;margin:0 auto;padding:40px 20px;line-height:1.7;color:#1f2937;background:#fffaf0}h1{font-family:Georgia,"Times New Roman",serif;font-size:clamp(2.2rem,7vw,4rem);line-height:1;margin-bottom:10px}label{display:block;font-weight:700;margin-top:16px}input,textarea,select{width:100%;padding:12px;border:1px solid #d4c8b4;border-radius:8px;margin-top:6px;background:#fffdf7}button{margin-top:20px;padding:12px 18px;background:#c0572f;color:#fff;border:none;border-radius:8px;font-weight:800;cursor:pointer}button:disabled{opacity:.7;cursor:not-allowed}.note{background:#f4efe5;border:1px solid #dfd2bd;border-radius:8px;padding:16px;margin:18px 0}.status{margin-top:16px;padding:12px 14px;border-radius:8px;display:none}.status.ok{display:block;background:#ecfdf5;border:1px solid #a7f3d0;color:#065f46}.status.err{display:block;background:#fef2f2;border:1px solid #fecaca;color:#991b1b}.hint{color:#5f6659;font-size:.95rem;margin-top:6px}</style>
</head>
<body>
  <h1>Order Intake</h1>
  <p>Submit your business details here after payment so the right repair plan can be prepared for the problem you purchased.</p>
  <div class="note">
    <p><strong>Order email:</strong> <a href="mailto:Hudsonhotshotsmoving@yahoo.com">Hudsonhotshotsmoving@yahoo.com</a></p>
  </div>
  <form id="intakeForm">
    <label>Which paid product did you buy?
      <select id="product" required>
        <option value="ai-visibility-audit">AI Visibility Audit - $49</option>
        <option value="implementation-kit">Implementation Kit - $159</option>
        <option value="local-ai-visibility-fix-kit">Local AI Visibility Fix Kit - paid</option>
        <option value="homepage-rewrite-kit">Homepage Rewrite Kit - paid</option>
        <option value="faq-schema-kit">FAQ + Schema Kit - paid</option>
        <option value="google-business-kit">Google Business Profile Fix Kit - paid</option>
      </select>
      <div class="hint">Use this form after checkout so your purchase can be matched to the right fix steps and emailed to you.</div>
    </label>
    <label>Business name<input id="business" type="text" required /></label>
    <label>Website URL<input id="website" type="url" required /></label>
    <label>City<input id="city" type="text" required /></label>
    <label>Main service<input id="service" type="text" required /></label>
    <label>Website platform
      <select id="platform" required>
        <option>WordPress</option>
        <option>Wix</option>
        <option>Squarespace</option>
        <option>Shopify</option>
        <option>Webflow</option>
        <option>GoDaddy</option>
        <option>Weebly</option>
        <option>Duda</option>
        <option>Framer</option>
        <option>Other</option>
      </select>
    </label>
    <label>Email<input id="email" type="email" required /></label>
    <label>Phone<input id="phone" type="text" /></label>
    <label>2 competitors if known<textarea id="competitors" rows="4"></textarea></label>
    <label>Key pages you want improved first<textarea id="pages" rows="4"></textarea></label>
    <label>Anything else we should know?<textarea id="notes" rows="5"></textarea></label>
    <button id="submitBtn" type="submit">Send intake details</button>
    <div id="status" class="status"></div>
  </form>
  <p><a href="/index.html">Back to home</a></p>
  <script>
    const form = document.getElementById('intakeForm');
    const statusBox = document.getElementById('status');
    const submitBtn = document.getElementById('submitBtn');
    const productSelect = document.getElementById('product');
    const requestedProduct = new URLSearchParams(window.location.search).get('product');
    if (requestedProduct && [...productSelect.options].some((option) => option.value === requestedProduct)) {
      productSelect.value = requestedProduct;
    }

    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      statusBox.className = 'status';
      statusBox.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending...';

      const payload = {
        product: document.getElementById('product').value,
        business: document.getElementById('business').value,
        website: document.getElementById('website').value,
        city: document.getElementById('city').value,
        service: document.getElementById('service').value,
        platform: document.getElementById('platform').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        competitors: document.getElementById('competitors').value,
        pages: document.getElementById('pages').value,
        notes: document.getElementById('notes').value,
      };

      try {
        const resp = await fetch('/api/intake', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await resp.json();
        if (!resp.ok) {
          throw new Error(data.error || 'Submission failed');
        }
        const params = new URLSearchParams();
        if (data.orderId) {
          params.set('order', data.orderId);
        }
        window.location.href = `/thank-you.html${params.toString() ? `?${params.toString()}` : ''}`;
      } catch (err) {
        statusBox.textContent = 'There was a problem sending your details. Please email Hudsonhotshotsmoving@yahoo.com directly.';
        statusBox.className = 'status err';
        statusBox.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send intake details';
      }
    });
  </script>
</body>
</html>
