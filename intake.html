<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Intake | Local AI Audit</title>
  <meta name="description" content="Submit your business details after buying an AI Visibility Audit or Implementation Kit." />
  <style>body{font-family:Inter,Arial,sans-serif;max-width:860px;margin:0 auto;padding:40px 20px;line-height:1.7;color:#1f2937}label{display:block;font-weight:600;margin-top:16px}input,textarea,select{width:100%;padding:12px;border:1px solid #d1d5db;border-radius:8px;margin-top:6px}button{margin-top:20px;padding:12px 18px;background:#4f46e5;color:#fff;border:none;border-radius:10px;font-weight:700;cursor:pointer}.note{background:#f8fafc;border:1px solid #e5e7eb;border-radius:14px;padding:16px;margin:18px 0}</style>
</head>
<body>
  <h1>Order Intake</h1>
  <p>Submit your business details here after purchase. This form opens your email with the details filled in so your order can be processed quickly.</p>
  <div class="note">
    <p><strong>Order email:</strong> <a href="mailto:Hudsonhotshotsmoving@yahoo.com">Hudsonhotshotsmoving@yahoo.com</a></p>
  </div>
  <form id="intakeForm">
    <label>Which product did you buy?
      <select id="product" required>
        <option value="AI Visibility Audit - $49">AI Visibility Audit - $49</option>
        <option value="Implementation Kit - $159">Implementation Kit - $159</option>
      </select>
    </label>
    <label>Business name<input id="business" type="text" required /></label>
    <label>Website URL<input id="website" type="url" required /></label>
    <label>City<input id="city" type="text" required /></label>
    <label>Main service<input id="service" type="text" required /></label>
    <label>Website platform
      <select id="platform" required>
        <option>WordPress</option>
        <option>Wix</option>
        <option>Squarespace</option>
        <option>Shopify</option>
        <option>Webflow</option>
        <option>GoDaddy</option>
        <option>Weebly</option>
        <option>Duda</option>
        <option>Framer</option>
        <option>Other</option>
      </select>
    </label>
    <label>Email<input id="email" type="email" required /></label>
    <label>Phone<input id="phone" type="text" /></label>
    <label>2 competitors if known<textarea id="competitors" rows="4"></textarea></label>
    <label>Key pages you want improved first<textarea id="pages" rows="4"></textarea></label>
    <label>Anything else we should know?<textarea id="notes" rows="5"></textarea></label>
    <button type="submit">Send intake details</button>
  </form>
  <p><a href="/index.html">Back to home</a></p>
  <script>
    document.getElementById('intakeForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const product = document.getElementById('product').value;
      const business = document.getElementById('business').value;
      const website = document.getElementById('website').value;
      const city = document.getElementById('city').value;
      const service = document.getElementById('service').value;
      const platform = document.getElementById('platform').value;
      const email = document.getElementById('email').value;
      const phone = document.getElementById('phone').value;
      const competitors = document.getElementById('competitors').value;
      const pages = document.getElementById('pages').value;
      const notes = document.getElementById('notes').value;

      const subject = encodeURIComponent('New Local AI Audit Order - ' + business);
      const body = encodeURIComponent(
        'Product: ' + product + '\n\n' +
        'Business Name: ' + business + '\n' +
        'Website URL: ' + website + '\n' +
        'City: ' + city + '\n' +
        'Main Service: ' + service + '\n' +
        'Website Platform: ' + platform + '\n' +
        'Email: ' + email + '\n' +
        'Phone: ' + phone + '\n\n' +
        'Competitors: ' + competitors + '\n\n' +
        'Key Pages To Improve First: ' + pages + '\n\n' +
        'Additional Notes: ' + notes
      );

      window.location.href = 'mailto:Hudsonhotshotsmoving@yahoo.com?subject=' + subject + '&body=' + body;
      setTimeout(function () {
        window.location.href = '/thank-you.html';
      }, 800);
    });
  </script>
</body>
</html>
